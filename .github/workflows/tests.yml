name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # tests import the repo as the cot_gateway package, so check out
          # into a directory with that exact name
          path: cot_gateway
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytak pytest
      - run: pytest cot_gateway/tests/ -v
